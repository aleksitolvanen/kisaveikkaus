name: Päivitä kisaveikkaus

# FIFA:n virallinen data -> site/index.html -> commit -> Cloudflare Pages -deploy.
#
# Hakustrategia (kohtelias FIFA:lle):
#  - "live" (joka 15 min): tekee API-kutsun VAIN jos jokin ottelu on parhaillaan
#    käynnissä (kickoff … +170 min), ja hakee vain sen tiukan aikaikkunan.
#    Päättyneitä otteluita ei haeta uudestaan. Tyhjillä ajoilla ei verkkokutsua.
#  - "schedule" (kerran/vrk): tuoreuttaa otteluohjelman + pudotuspeliparit/-ajat.
#
# Manuaaliset kentät (sikajengi, cup-jatkoonpääsijät, maalintekijämaalit)
# syötetään käsin data/mm2026/results.json:iin; fetch-fifa säilyttää ne.

on:
  schedule:
    - cron: "*/5 * * * *"    # live-tulokset (self-gating; kutsuu APIa vain matsin aikana, deploy vain muutoksella)
    - cron: "0 5 * * *"      # otteluohjelman päivätuoreutus (parit, aikamuutokset)
  workflow_dispatch:
    inputs:
      mode:
        description: "fetch-fifa --mode (live / schedule / results / all)"
        default: "all"

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Helsinki   # ajat lasketaan Suomen aikaan riippumatta runnerista
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Hae FIFA-data ja regeneroi sivu
        run: |
          MODE=live
          if [ "${{ github.event.schedule }}" = "0 5 * * *" ]; then MODE=schedule; fi
          if [ -n "${{ github.event.inputs.mode }}" ]; then MODE="${{ github.event.inputs.mode }}"; fi
          echo "fetch-fifa --mode=$MODE"
          node tools/fetch-fifa.mjs mm2026 --mode="$MODE"
          node site.mjs mm2026

      - name: Committaa ja pushaa muutokset
        run: |
          git config user.name "kisaveikkaus-päivitys"
          git config user.email "noreply@github.com"
          git add -f data/mm2026/tournament.json data/mm2026/results.json site/index.html site/data.json site/_headers
          if ! git diff --quiet --cached; then
            git commit -m "Päivitä ($(date -u +%FT%H:%MZ))"
            git pull --rebase --autostash
            git push
          else
            echo "Ei muutoksia."
          fi
